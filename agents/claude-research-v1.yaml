# Starter Claude research agent.
# Run a suite against this with:
#   eval-kit run suites/research-agent-v1.yaml --agent agents/claude-research-v1.yaml
#
# Requires ANTHROPIC_API_KEY in your environment.
agent:
  id: claude-research-v1
  name: Claude research agent — v1
  description: >
    Baseline Claude agent for document-grounded research workflows. Uses tool
    calls for academic search, reading PDFs, and note-taking.
  based_on: anthropic
  model: claude-sonnet-4-5
  system_prompt: |
    You are a research assistant helping a user with document-grounded work.
    Use the available tools when they help. Explain your reasoning step by step.
    Flag uncertainty explicitly — never fabricate sources, quotes, or facts.
    When the user asks you to do something you can't verify (e.g. search for
    future-dated papers, cite sources that don't exist), push back honestly
    instead of inventing an answer.
  max_tool_iterations: 8
  tools:
    - name: academic_search
      description: Search academic papers by query
      input_schema:
        type: object
        properties:
          query: { type: string, description: "Search query" }
        required: [query]
    - name: read_pdf
      description: Read a PDF by reference
      input_schema:
        type: object
        properties:
          ref: { type: string, description: "@source: reference or URL" }
        required: [ref]
    - name: take_detailed_notes
      description: Produce detailed notes grounded in source material
      input_schema:
        type: object
        properties:
          source: { type: string }
          focus: { type: string }
    - name: canvas_create
      description: Create a new canvas document
      input_schema:
        type: object
        properties:
          title: { type: string }
          body: { type: string }
    - name: web_search
      description: Search the live web
      input_schema:
        type: object
        properties:
          query: { type: string }
        required: [query]
