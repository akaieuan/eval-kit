# Dependabot configuration for eval-kit.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Policy:
# - Monthly cadence. Low-volume by design — one PR at a time per ecosystem.
# - Patch + minor grouped into a single PR per ecosystem.
# - Majors get their own PRs (still capped at 1 open at a time per ecosystem).
# - Security advisories open immediately regardless of cadence or cap.

version: 2
updates:
  # Root package + workspace packages (pnpm workspace).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      patch-and-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
    ignore:
      # React is pinned via @hitl-kit; bumping here without a coordinated
      # @hitl-kit release just creates noise.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # Dashboard app — separate ecosystem entry so Next.js majors don't get
  # silently bundled into the root group.
  - package-ecosystem: "npm"
    directory: "/apps/dashboard"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "dashboard"
    commit-message:
      prefix: "deps(dashboard)"
      include: "scope"

  # GitHub Actions versions in .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
