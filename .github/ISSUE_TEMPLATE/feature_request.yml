name: Feature request
description: Propose a new capability or surface for eval-kit
title: "[feat] "
labels: ["type/feature"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check [docs/ROADMAP.md](../../blob/main/docs/ROADMAP.md) — the feature may already be planned for v0.4 or v0.5.
        For architectural changes, open a discussion first or propose an RFC under `docs/rfcs/`.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the real-world workflow that's blocked or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see? A CLI command, a schema field, a dashboard surface?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this. It's fine to say "none" if you're unsure.

  - type: dropdown
    id: guardrail_check
    attributes:
      label: Does this respect the §13 guardrails?
      description: Humans score (not LLMs), real tasks (not synthetic), multi-step, no leaderboard marketing. See [docs/BRIEF.md §13](../../blob/main/docs/BRIEF.md).
      options:
        - "Yes, fits within the guardrails"
        - "Unsure — would like maintainer input"
        - "No, this is a deliberate guardrail discussion"
    validations:
      required: true
